name: CD - Build, Push and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/crud-libros:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/crud-libros:latest

      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/crud-libros:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en servidor remoto
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKER_USERNAME }}/crud-libros:latest"

            docker pull $IMAGE
            sudo docker rm -f crud-libros-new || true
            docker run -d \
              --name crud-libros-new \
              --restart unless-stopped \
              -p 8081:3000 \
              $IMAGE

            sleep 5

            if curl -sf http://localhost:8081/health; then
              echo "Health check exitoso. Activando nuevo contenedor..."

              sudo docker rm -f crud-libros || true

              docker run -d \
                --name crud-libros \
                --restart unless-stopped \
                -p 8080:3000 \
                $IMAGE

              docker rm -f crud-libros-new || true
            else
              echo "Health check FALLIDO. Manteniendo version anterior."
              docker rm -f crud-libros-new || true
              exit 1
            fi

            docker system prune -f